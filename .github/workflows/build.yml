- name: Debug - Show Me My Files
        run: |
          echo "--- Current Directory ---"
          pwd
          echo "--- All Files in Repo ---"
          find . -maxdepth 4 -not -path '*/.*'
          
      - name: Build Debug APK
        run: |
          # This will try to find the folder again but tell us if it fails
          SUBFOLDER=$(find . -name "settings.gradle.kts" -printf '%h\n' | head -n 1)
          if [ -z "$SUBFOLDER" ]; then
            echo "ERROR: Could not find settings.gradle.kts anywhere!"
            exit 1
          fi
          echo "Found project in: $SUBFOLDER"
          cd "$SUBFOLDER"
          chmod +x gradlew
          ./gradlew assembleDebug
