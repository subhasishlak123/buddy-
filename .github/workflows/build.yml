name: Build DeskBuddy APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug - List All Files
        # This will show us EXACTLY where your files are in the logs
        run: find . -maxdepth 3 -not -path '*/.*'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # We remove the 'cache: gradle' line for now to stop the error
          
      - name: Grant Execute Permission
        # This will find gradlew even if it's in a subfolder
        run: find . -name "gradlew" -exec chmod +x {} +

      - name: Build Debug APK
        # This command finds the subfolder automatically and builds it
        run: |
          SUBFOLDER=$(find . -name "settings.gradle.kts" -printf '%h\n' | head -n 1)
          cd "$SUBFOLDER"
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeskBuddy-App
          path: "**/build/outputs/apk/debug/*.apk"
