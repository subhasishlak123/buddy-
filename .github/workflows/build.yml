name: Build DeskBuddy APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This tells EVERY step below to look inside your folder
    defaults:
      run:
        working-directory: ./buddy-

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # This ensures the checkout happens correctly for the subfolder
          sparse-checkout: .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeskBuddy-App
          # Path must point to the APK inside the subfolder
          path: buddy-/app/build/outputs/apk/debug/*.apk
